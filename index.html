<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>One Source L.A. | Interactive Map</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Interactive map of Los Angeles County landmarks, neighborhoods, and hidden corners. Explore and navigate over 1,000 pinned locations across the city." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://lasourcebook.com/map.html" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lasourcebook.com/map.html" />
    <meta property="og:title" content="One Source L.A. | Interactive Map" />
    <meta property="og:description" content="Interactive map of over 1,000 Los Angeles landmarks and neighborhoods." />
    <meta property="og:image" content="https://lasourcebook.com/logo.webp" />
    <meta property="twitter:card" content="summary_large_image" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://unpkg.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src https://maps.googleapis.com https://maps.gstatic.com https://www.google-analytics.com https://analytics.google.com; frame-ancestors 'none';" />

    <!-- Google Analytics 4 — replace G-XXXXXXXXXX with your Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX', { send_page_view: true });
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />

    <style>
        :root {
            --bg-color: #d6e8f7;
            --surface: #c2d9ef;
            --text-main: #0d1b2a;
            --text-secondary: #3a5a7a;
            --primary: #1a4b8c;
            --accent: #1e6eb5;
            --border: rgba(13, 27, 42, 0.15);
        }

        /* Accessible focus styles */
        :focus-visible {
            outline: 3px solid var(--primary);
            outline-offset: 2px;
            border-radius: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Split Layout --- */
        #sidebar {
            width: 400px;
            height: 100vh;
            background-color: var(--bg-color);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.5);
        }

        #map {
            flex-grow: 1;
            height: 100vh;
            background: #c0d5eb;
        }

        /* --- Sidebar Styles --- */
        .sidebar-header {
            padding: 1.5rem 1.5rem 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: rgba(214, 232, 247, 0.97);
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            display: block;
            text-decoration: none;
        }

        .search-box {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--primary);
        }

        /* --- Legend --- */
        .legend {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .indicator.landmark {
            background: var(--accent);
        }

        .indicator.subhood {
            background: var(--primary);
        }

        #location-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        #location-list::-webkit-scrollbar {
            width: 6px;
        }

        #location-list::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        #location-list::-webkit-scrollbar-thumb {
            background: var(--surface);
            border-radius: 3px;
        }

        .hood-group {
            margin-bottom: 1.5rem;
        }

        .hood-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            padding-bottom: 0.25rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: -1rem;
            background: var(--bg-color);
            z-index: 10;
            padding-top: 1rem;
        }

        .location-item {
            padding: 0.75rem;
            background: var(--surface);
            border: 1px solid transparent;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .location-item:hover {
            border-color: var(--border);
            background: rgba(30, 110, 181, 0.12);
            transform: translateX(4px);
        }

        .location-item.active {
            border-color: var(--primary);
            background: rgba(26, 75, 140, 0.15);
        }

        .loc-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
            color: var(--text-main);
        }

        .loc-type {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .type-landmark {
            color: var(--accent);
        }

        .type-subhood {
            color: var(--primary);
        }

        .loc-address {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Google Maps InfoWindow Customization --- */
        .gm-style-iw.gm-style-iw-c {
            background-color: var(--surface) !important;
            color: var(--text-main) !important;
            border-radius: 8px !important;
            padding: 0 !important;
            max-width: 300px !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8) !important;
        }

        .gm-style-iw-d {
            overflow: auto !important;
            max-height: 400px !important;
        }

        /* Hide the annoying white tail of the info window */
        .gm-style-iw-tc::after {
            background-color: var(--surface) !important;
        }

        .gm-ui-hover-effect {
            top: 5px !important;
            right: 5px !important;
            background: rgba(0, 0, 0, 0.3) !important;
            border-radius: 50% !important;
        }

        .gm-ui-hover-effect span {
            background-color: #fff !important;
        }

        .custom-popup {
            padding: 16px;
            font-family: 'Outfit', sans-serif;
        }

        .popup-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .popup-hood {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .popup-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .popup-address {
            font-size: 0.8rem;
            color: var(--text-main);
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: 55vh;
                border-right: none;
                border-top: 1px solid var(--border);
                box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.5);
                order: 2;
                /* Sidebar at bottom */
            }

            #map {
                width: 100%;
                height: 45vh;
                order: 1;
                /* Map at top */
            }

            .sidebar-header {
                padding: 1rem;
            }

            .logo {
                font-size: 1.25rem;
                margin-bottom: 0.5rem;
            }

            .gm-style-iw.gm-style-iw-c {
                max-width: 280px !important;
                padding: 0 !important;
            }
        }
    </style>
</head>

<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2>Loading One Source L.A.<br>A Definitive Gazetteer of Los Angeles County</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">Loading the landmarks, lore, and layers of L.A.</p>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <a href="landing.html" class="logo">One Source L.A.</a>
            <form onsubmit="document.getElementById('searchBox').blur(); return false;" style="margin: 0; padding: 0;">
                <label for="searchBox"
                    style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;">Search
                    landmarks, neighborhoods, and history</label>
                <input type="search" id="searchBox" class="search-box" autocomplete="off"
                    aria-label="Search landmarks, neighborhoods, and history"
                    placeholder="Search landmarks, neighborhoods, history..." />
            </form>
            <div class="legend">
                <div class="legend-item">
                    <div class="indicator landmark"></div> Landmark
                </div>
                <div class="legend-item">
                    <div class="indicator subhood"></div> Sub-Neighborhood
                </div>
            </div>
        </div>
        <div id="location-list"></div>
    </div>

    <div id="map"></div>

    <!-- Data -->
    <script src="neighborhoods.min.js"></script>
    <script src="descriptions.min.js"></script>

    <!-- Google Maps JS API -->
    <!-- ⚠️ SECURITY: Restrict this API key in Google Cloud Console to your domain + Maps JS API only -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB9_MF2J2Lkb2WhL2-fwwRkfsobBJ0Clps&callback=initMap"
        async defer></script>

    <!-- Official MarkerClusterer for Google Maps -->
    <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

    <script>
        // ─── Security: HTML escape for safe innerHTML injection ──────────────
        function escapeHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ─── Debounce utility ────────────────────────────────────────────────
        function debounce(fn, delay) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
        }


        async function fetchDescriptions() {
            return typeof globalDescriptions !== 'undefined' ? globalDescriptions : {};
        }

        let map;

        let markersArray = [];
        let markerCluster;
        let infoWindow;
        let allLocations = [];
        let markerMap = new Map();

        // Light blue + navy map style (matching NRK-inspired palette)
        const darkMapStyle = [
            { elementType: "geometry", stylers: [{ color: "#cfe0f0" }] },
            { elementType: "labels.text.stroke", stylers: [{ color: "#d6e8f7" }] },
            { elementType: "labels.text.fill", stylers: [{ color: "#1a4b8c" }] },
            {
                featureType: "administrative.locality",
                elementType: "labels.text.fill",
                stylers: [{ color: "#0d1b2a" }],
            },
            {
                featureType: "poi",
                elementType: "labels.text.fill",
                stylers: [{ color: "#1e6eb5" }],
            },
            {
                featureType: "poi.park",
                elementType: "geometry",
                stylers: [{ color: "#b8d4e8" }],
            },
            {
                featureType: "poi.park",
                elementType: "labels.text.fill",
                stylers: [{ color: "#2d6a4f" }],
            },
            {
                featureType: "road",
                elementType: "geometry",
                stylers: [{ color: "#b0c8df" }],
            },
            {
                featureType: "road",
                elementType: "geometry.stroke",
                stylers: [{ color: "#9ab8d0" }],
            },
            {
                featureType: "road",
                elementType: "labels.text.fill",
                stylers: [{ color: "#3a5a7a" }],
            },
            {
                featureType: "road.highway",
                elementType: "geometry",
                stylers: [{ color: "#a8c4d8" }],
            },
            {
                featureType: "road.highway",
                elementType: "geometry.stroke",
                stylers: [{ color: "#8fb1c8" }],
            },
            {
                featureType: "road.highway",
                elementType: "labels.text.fill",
                stylers: [{ color: "#0d1b2a" }],
            },
            {
                featureType: "water",
                elementType: "geometry",
                stylers: [{ color: "#4a90c4" }],
            },
            {
                featureType: "water",
                elementType: "labels.text.fill",
                stylers: [{ color: "#1a4b8c" }],
            },
            {
                featureType: "water",
                elementType: "labels.text.stroke",
                stylers: [{ color: "#3a78b5" }],
            },
            // ── Hide all Google POI icons & labels so custom pins dominate ──
            {
                featureType: "poi",
                elementType: "labels",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "poi",
                elementType: "labels.icon",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "poi.business",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "poi.attraction",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "poi.government",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "poi.medical",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "poi.place_of_worship",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "poi.school",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "poi.sports_complex",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "transit",
                elementType: "labels",
                stylers: [{ visibility: "off" }],
            },
            {
                featureType: "transit",
                elementType: "labels.icon",
                stylers: [{ visibility: "off" }],
            }
        ];

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                zoom: 11,
                center: { lat: 34.0522, lng: -118.2437 },
                styles: darkMapStyle,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: false
            });

            infoWindow = new google.maps.InfoWindow();

            // Deselect sidebar when info window closes
            google.maps.event.addListener(infoWindow, 'closeclick', function () {
                document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
            });

            processData();

            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
            }, 800);
        }

        // Standard Google Maps colored pins
        // Use HTTPS to avoid mixed-content warnings
        const iconBase = 'https://maps.google.com/mapfiles/ms/icons/';

        function processData() {
            if (typeof neighborhoodData === 'undefined') return;



            let idx = 0;
            let listHTML = '';

            function processChunk() {
                const end = Math.min(idx + 50, neighborhoodData.length); // Process 50 neighborhoods per chunk to speed up overall execution

                for (; idx < end; idx++) {
                    const hood = neighborhoodData[idx];
                    const allLocs = hood.locations || [];
                    if (allLocs.length === 0) continue;

                    let hoodHTML = `<div class="hood-group" id="hood-group-${hood.id}">
                        <div class="hood-title" role="heading" aria-level="2">
                            ${escapeHtml(hood.name)} <span style="font-size:0.7em; color:var(--text-secondary); font-weight:normal;">(${escapeHtml(hood.region)})</span>
                        </div>`;

                    allLocs.forEach((loc, index) => {
                        const locId = `${hood.id}-loc-${index}`;

                        allLocations.push({ ...loc, locId, hoodId: hood.id, hoodName: hood.name, hoodRegion: hood.region });

                        const cleanType = (loc.type || 'landmark').toLowerCase();
                        const typeClass = cleanType.includes('sub') ? 'type-subhood' : 'type-landmark';

                        // Cyan/Blue for sub-hoods, Green for Landmarks
                        const pinColor = cleanType.includes('sub') ? 'blue-dot.png' : 'green-dot.png';

                        hoodHTML += `
                            <div class="location-item" id="sidebar-${locId}"
                                 onclick="flyToLocation('${locId}')"
                                 role="button" tabindex="0"
                                 aria-label="Go to ${escapeHtml(loc.name)}"
                                 onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();flyToLocation('${locId}');}">
                                <div class="loc-name" id="sidebar-name-${locId}">${escapeHtml(loc.name)}</div>
                                <div class="loc-type ${typeClass}" id="sidebar-type-${locId}">${escapeHtml(loc.type || 'Landmark')}</div>
                                <div class="loc-address" id="sidebar-address-${locId}" style="display: ${loc.address ? 'block' : 'none'}; margin-top: 0.25rem;">${escapeHtml(loc.address || '')}</div>
                            </div>
                        `;

                        const generatePopupContent = async () => {
                            const descs = await fetchDescriptions();
                            const hoodId = hood.id || hood.name.toLowerCase().replace(/ /g, '-');
                            const locKey = loc.id || loc.name;
                            const description = (descs[hoodId] && descs[hoodId][locKey]) ? descs[hoodId][locKey] : '';

                            const mapLink = escapeHtml(loc.mapUrl || (loc.lat && loc.lng ? `https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.name)}`));
                            return `
                            <div class="custom-popup">
                                <div class="popup-hood">${escapeHtml(hood.name)}</div>
                                <div class="popup-title">${escapeHtml(loc.name)}</div>
                                ${description ? `<div class="popup-desc">${escapeHtml(description)}</div>` : ''}
                                ${loc.address ? `<div class="popup-address">${escapeHtml(loc.address)}</div>` : ''}
                                <div style="margin-top:10px;">
                                    <a href="${mapLink}" target="_blank" rel="noopener noreferrer"
                                       style="color:var(--primary); font-weight:600; text-decoration:none;"
                                       aria-label="View ${escapeHtml(loc.name)} on Google Maps">
                                       View on Google Maps ↗
                                    </a>
                                </div>
                            </div>`;
                        };

                        if (loc.lat && loc.lng) {
                            const marker = new google.maps.Marker({
                                position: { lat: loc.lat, lng: loc.lng },
                                icon: iconBase + pinColor,
                                title: loc.name
                            });

                            marker.addListener('click', async () => {
                                infoWindow.setContent(await generatePopupContent());
                                infoWindow.open(map, marker);
                                highlightSidebarItem(locId);
                                map.panTo(marker.getPosition());
                                // Analytics: track marker clicks
                                if (typeof gtag === 'function') gtag('event', 'map_marker_click', { location_name: loc.name, neighborhood: hood.name });
                            });

                            // Store both marker and popup content generator
                            markerMap.set(locId, { marker: marker, generateContent: generatePopupContent });
                            markersArray.push(marker);
                        } else {
                            // Store without marker for sidebar click handling
                            markerMap.set(locId, { marker: null, generateContent: generatePopupContent });
                        }
                    });

                    hoodHTML += `</div>`;
                    listHTML += hoodHTML;
                }

                if (idx < neighborhoodData.length) {
                    setTimeout(processChunk, 0);
                } else {
                    document.getElementById('location-list').innerHTML = listHTML;

                    // Initialize the official @googlemaps/markerclusterer using the much faster SuperClusterAlgorithm
                    markerCluster = new markerClusterer.MarkerClusterer({
                        map: map,
                        markers: markersArray,
                        algorithm: new markerClusterer.SuperClusterAlgorithm({
                            radius: 60,
                            maxZoom: 16
                        })
                    });
                }
            }

            // Kick off chunked processing
            requestAnimationFrame(processChunk);
        }

        async function flyToLocation(locId) {
            const data = markerMap.get(locId);
            if (data) {
                if (data.marker) {
                    map.setZoom(15);
                    map.panTo(data.marker.getPosition());
                    infoWindow.setContent(await data.generateContent());
                    infoWindow.open(map, data.marker);
                } else {
                    alert("This location has not been mapped yet.");
                }
                highlightSidebarItem(locId);
            }
        }

        function highlightSidebarItem(locId) {
            document.querySelectorAll('.location-item').forEach(el => el.classList.remove('active'));
            const el = document.getElementById('sidebar-' + locId);
            if (el) {
                el.classList.add('active');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        const handleMapSearch = debounce(async (query) => {
            if (!query) {
                document.querySelectorAll('.hood-group, .location-item').forEach(el => el.style.display = 'block');
                return;
            }

            const descs = await fetchDescriptions();
            document.querySelectorAll('.hood-group, .location-item').forEach(el => el.style.display = 'none');

            const matchedIds = new Set();
            const matchedHoodIds = new Set();

            allLocations.forEach(loc => {
                const hoodIdRaw = loc.hoodId || loc.hoodName.toLowerCase().replace(/ /g, '-');
                const locKey = loc.id || loc.name;
                const desc = (descs[hoodIdRaw] && descs[hoodIdRaw][locKey]) ? descs[hoodIdRaw][locKey] : '';

                const searchString = `${loc.name} ${desc} ${loc.address || ''} ${loc.hoodName} ${loc.type || ''} `.toLowerCase();
                if (searchString.includes(query)) {
                    matchedIds.add(loc.locId);
                    const hoodIdMatch = loc.locId.match(/^(.*)-loc-\d+$/);
                    if (hoodIdMatch) matchedHoodIds.add(hoodIdMatch[1]);
                }
            });

            matchedHoodIds.forEach(hoodId => {
                const groupEl = document.getElementById('hood-group-' + hoodId);
                if (groupEl) groupEl.style.display = 'block';
            });
            matchedIds.forEach(locId => {
                const itemEl = document.getElementById('sidebar-' + locId);
                if (itemEl) itemEl.style.display = 'block';
            });

            // Analytics: track map search queries
            if (query.length > 2) {
                gtag('event', 'search', { search_term: query, page: 'map' });
            }
        }, 200);

        document.getElementById('searchBox').addEventListener('input', (e) => {
            handleMapSearch(e.target.value.toLowerCase().trim());
        });
    </script>
</body>
